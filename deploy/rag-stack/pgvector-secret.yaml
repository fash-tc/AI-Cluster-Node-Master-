# pgvector credentials for the in-cluster RAG vector store.
#
# *** Set a real password before applying this in any environment that
# *** matters. The default below is a placeholder.
#
# The service is ClusterIP-only by design, so this credential is reachable
# only from inside the K8s cluster — but treat it as a real DB password
# anyway, especially once multi-team usage starts.
apiVersion: v1
kind: Secret
metadata:
  name: pgvector-credentials
  namespace: lab-domains-sre
type: Opaque
stringData:
  POSTGRES_USER: rag
  POSTGRES_PASSWORD: CHANGE_ME_BEFORE_APPLY
  POSTGRES_DB: rag
