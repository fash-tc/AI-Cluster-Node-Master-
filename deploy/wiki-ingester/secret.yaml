# Atlassian credentials for the wiki-ingester.
#
# DO NOT commit a populated copy of this file. The values shown here are
# placeholders. Replace them locally just before applying, or apply via
# `kubectl create secret generic wiki-ingester-creds ...` instead and
# remove this file from the kustomization.
#
# To generate an Atlassian API token:
#   https://id.atlassian.com/manage-profile/security/api-tokens
#
# The token only needs Confluence read access for the OCC space.
apiVersion: v1
kind: Secret
metadata:
  name: wiki-ingester-creds
  namespace: lab-domains-sre
type: Opaque
stringData:
  ATLASSIAN_EMAIL: REPLACE_ME@tucowsinc.com
  ATLASSIAN_API_TOKEN: REPLACE_ME_WITH_ATLASSIAN_API_TOKEN
