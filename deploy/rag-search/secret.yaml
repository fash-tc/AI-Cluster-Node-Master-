# DSN that rag-search uses to talk to pgvector.
#
# *** Replace the password with the real value from pgvector-credentials
# *** before applying. Default is a placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: rag-search-pg-dsn
  namespace: lab-domains-sre
type: Opaque
stringData:
  dsn: postgresql://rag:CHANGE_ME_BEFORE_APPLY@domains-pgvector.lab-domains-sre.svc.cluster.local:5432/rag
