apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-32b-thinking-aicompute02
  namespace: lab-domains-sre
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qwen3-32b-thinking
      node: aicompute02
  template:
    metadata:
      labels:
        app: qwen3-32b-thinking
        node: aicompute02
    spec:
      nodeSelector:
        kubernetes.io/hostname: aicompute02.cnco1.tucows.cloud
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              exec vllm serve "${MODEL_ID}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --host 0.0.0.0 \
                --port 8000 \
                --trust-remote-code \
                --max-model-len "${MAX_MODEL_LEN}" \
                --max-num-seqs "${MAX_NUM_SEQS}" \
                --max-num-batched-tokens "${MAX_NUM_BATCHED_TOKENS}" \
                --reasoning-parser deepseek_r1 \
                --enable-auto-tool-choice \
                --tool-call-parser hermes \
                --disable-uvicorn-access-log
          ports:
            - containerPort: 8000
              name: openai
          envFrom:
            - configMapRef:
                name: qwen3-32b-thinking-aicompute02-config
          env:
            - name: HF_HOME
              value: /models/huggingface
            - name: SAFETENSORS_FAST_GPU
              value: "1"
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "3600"
            - name: VLLM_LOG_STATS_INTERVAL
              value: "10"
          resources:
            requests:
              cpu: "16"
              memory: "96Gi"
              nvidia.com/gpu: 4
            limits:
              cpu: "32"
              memory: "160Gi"
              nvidia.com/gpu: 4
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: dshm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen3-32b-thinking-aicompute02-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
